    <!-- Signup Section -->
    <section class="login-section">


        <div class="container">
            <div class="login-card mx-auto">
                <div class="login-header">
                    <h1 class="login-title">Create Account</h1>
                    <p class="login-subtitle">Start your journey with Vingo Menu today</p>
                </div>

                <form class="contact-form" action="register.php" method="POST">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="restaurant">Restaurant Name</label>
                        <input type="text" id="restaurant" name="restaurant" required placeholder="John's Kitchen">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="admin@restaurant.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Create a password">
                    </div>

                    <div class="form-options">
                        <label style="display: flex; align-items: flex-start; cursor: pointer; font-size: 0.85rem;">
                            <input type="checkbox" style="width: auto; margin-right: 0.5rem; margin-top: 3px;" required>
                            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                                    Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>

                    <div class="text-center"
                        style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-color-light);">
                        Already have an account? <a href="login.html" style="color: var(--primary-color);">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
