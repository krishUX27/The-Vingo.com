<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vingo Menu Admin | Login</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->
    <header class="header" id="header">
        <div class="container header-container">
            <a href="index.html" class="logo">VINGO<span class="dot">.</span></a>

            <nav class="nav" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="vingoProduct/index.html" class="nav-link">Product</a></li>
                    <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
                    <li class="nav-item"><a href="contact.php" class="nav-link">Contact</a></li>
                </ul>
                <div class="nav-close" id="nav-close">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
            </nav>

            <div class="header-actions">
                <a href="login.html" class="btn btn-primary nav-btn">Sign In</a>
                <div class="nav-toggle" id="nav-toggle">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </div>
            </div>

            <div class="nav-overlay" id="nav-overlay"></div>
        </div>
    </header>

    <!-- Login Section -->
    <section class="login-section">


        <div class="container">
            <div class="login-card mx-auto">
                <div class="login-header">
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Login to manage your Vingo Menu</p>
                </div>

                <form class="contact-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="admin@restaurant.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <div class="form-options">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" style="width: auto; margin-right: 0.5rem;"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <p id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;">
                        Invalid credentials</p>

                    <button type="submit" class="btn btn-primary btn-full">Login</button>

                    <div class="text-center"
                        style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-color-light);">
                        Don't have an account? <a href="signup.html" style="color: var(--primary-color);">Create
                            Account</a>
                    </div>
                </form>

                <script>
                    document.getElementById('loginForm').addEventListener('submit', async function (e) {
                        e.preventDefault();
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;
                        const errorMsg = document.getElementById('errorMsg');

                        try {
                            const response = await fetch('api/login.php', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password })
                            });

                            const data = await response.json();

                            if (response.ok && data.db) {
                                // Redirect to dashboard with DB param
                                window.location.href = `dashboard.html?db=${data.db}`;
                            } else {
                                errorMsg.textContent = data.message || "Login failed";
                                errorMsg.style.display = 'block';
                            }
                        } catch (error) {
                            console.error(error);
                            errorMsg.textContent = "An error occurred. Please try again.";
                            errorMsg.style.display = 'block';
                        }
                    });
                </script>
            </div>
        </div>
    </section>

    <script src="js/app.js?v=1.1"></script>
</body>

</html>
